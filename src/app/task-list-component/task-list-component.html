<h2>Tasks List</h2>

<a [routerLink]="['/t-list', 't-add']" class="btn-view">Add</a>

<table>
  <tbody>
    @for (t of taskmodel; track t.id) { 
      <tr>
        <td>{{ t.id }}</td>
        <td>{{ t.title }}</td> 
        <td>{{ t.description }}</td> 
        <td>
          <a [routerLink]="['/t-list', t.id, 't-detail']" class="btn-view">View</a>
        </td>
        <td>
          <a [routerLink]="['/t-list', t.id, 't-edit']" class="btn-view">Edit</a>
        </td> 
      </tr>
    }
  </tbody>
</table>

<div class="taskdetail-container"></div>
<div class="taskadd-container"></div>
<div class="taskedit-container"></div>

<router-outlet></router-outlet>
